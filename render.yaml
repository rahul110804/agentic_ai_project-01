# render.yaml — place this in the ROOT of your GitHub repo

services:
  - type: web
    name: agentic-rag-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # you enter this manually in Render dashboard
      - key: TAVILY_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: agentic-rag-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false          # you enter your Vercel URL here after deploying frontend
      - key: RELOAD
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: agentic-rag-db
    plan: free
    databaseName: ragdb
    user: raguser